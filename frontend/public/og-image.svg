<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative chart bars (left side) -->
  <g transform="translate(80, 180)" opacity="0.15">
    <rect x="0" y="120" width="40" height="180" rx="4" fill="#e94560"/>
    <rect x="60" y="60" width="40" height="240" rx="4" fill="#e94560"/>
    <rect x="120" y="160" width="40" height="140" rx="4" fill="#e94560"/>
    <rect x="180" y="20" width="40" height="280" rx="4" fill="#e94560"/>
    <rect x="240" y="100" width="40" height="200" rx="4" fill="#e94560"/>
  </g>

  <!-- Decorative pie chart (right side) -->
  <g transform="translate(1020, 420)" opacity="0.12">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#e94560" stroke-width="20" stroke-dasharray="126 377"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#fff" stroke-width="20" stroke-dasharray="188 377" stroke-dashoffset="-126"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#53d8fb" stroke-width="20" stroke-dasharray="63 377" stroke-dashoffset="-314"/>
  </g>

  <!-- App icon -->
  <g transform="translate(80, 60)">
    <rect width="56" height="56" rx="12" fill="#e94560"/>
    <path d="M16 18h16v3H16zM16 25h22v3H16zM16 32h20v3H16z" fill="#fff" opacity="0.8"/>
    <circle cx="38" cy="38" r="10" fill="#fff"/>
    <path d="M34 38l3 3 5-5" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="160" y="100" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">
    One-Click Report AI
  </text>

  <!-- Main tagline -->
  <text font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" fill="#ffffff">
    <tspan x="80" y="260" font-size="52">Transformez vos données</tspan>
    <tspan x="80" y="320" font-size="52">en rapports PDF</tspan>
    <tspan x="80" y="380" font-size="52" fill="url(#accent)">en 1 clic.</tspan>
  </text>

  <!-- Features badges -->
  <g transform="translate(80, 430)">
    <rect width="150" height="40" rx="20" fill="#e94560" opacity="0.9"/>
    <text x="75" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Résumé IA</text>

    <rect x="170" width="180" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="260" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Graphiques HD</text>

    <rect x="370" width="140" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="440" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">4 langues</text>

    <rect x="530" width="120" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="590" y="26" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Gratuit</text>
  </g>

  <!-- Subtitle -->
  <text x="80" y="530" font-family="Inter, system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)">
    CSV / JSON → PDF professionnel avec résumé IA en quelques secondes
  </text>

  <!-- URL -->
  <text x="80" y="590" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.4)">
    report.marksystems.ca
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
