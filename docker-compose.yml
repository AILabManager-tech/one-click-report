services:
  backend:
    build: ./backend
    container_name: ocr-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - FRONTEND_URL=https://report.marksystems.ca
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - reports_data:/tmp/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    container_name: ocr-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - backend

volumes:
  reports_data:
